<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vista Gerente — Megatiendas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a1a1a;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:.75rem 1rem 3rem}

/* HEADER */
.hdr{background:linear-gradient(135deg,#042C53,#0C447C);border-radius:14px;padding:1rem 1.1rem 1.1rem;margin-bottom:.875rem}
.hdr-brand{font-size:11px;font-weight:700;color:#B5D4F4;margin-bottom:.625rem;letter-spacing:.5px}
.hdr-title{font-size:18px;font-weight:800;color:#fff;margin-bottom:.875rem;line-height:1.2}

/* ZONA PILLS */
.zona-row{display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap}
.zbtn{font-family:inherit;font-size:12px;font-weight:700;color:rgba(255,255,255,.7);background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);border-radius:20px;padding:6px 14px;cursor:pointer;transition:all .2s;white-space:nowrap}
.zbtn.on{color:#fff;background:rgba(255,255,255,.22);border-color:#fff}
.zbtn:hover{background:rgba(255,255,255,.15)}

/* STORE SELECT */
.store-sel-wrap{position:relative}
.store-sel-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.store-sel{font-family:inherit;font-size:14px;font-weight:700;color:#fff;background:rgba(255,255,255,.13);border:1.5px solid rgba(255,255,255,.3);border-radius:10px;padding:8px 14px;cursor:pointer;width:100%;appearance:none;-webkit-appearance:none}
.store-sel option{color:#042C53;background:#fff;font-weight:600}

/* STATUS */
.status-row{display:flex;align-items:center;gap:7px;margin-top:.625rem}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-txt{font-size:11px;color:rgba(255,255,255,.55);flex:1}
.sync-btn{font-family:inherit;font-size:11px;font-weight:700;color:rgba(255,255,255,.75);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;cursor:pointer}
.sync-btn:hover{background:rgba(255,255,255,.2)}

/* TODAY INFO */
.today-card{background:#fff;border-radius:12px;padding:.875rem 1rem;margin-bottom:.875rem;border:1px solid #dde6f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.today-date{font-size:22px;font-weight:800;color:#042C53}
.today-day{font-size:11px;color:#888;font-weight:600;margin-top:2px}
.today-pct-wrap{text-align:right}
.today-pct{font-size:28px;font-weight:800}
.today-pct-lbl{font-size:10px;color:#888;font-weight:600}
.today-bar{height:6px;border-radius:3px;background:#E6F1FB;overflow:hidden;margin-top:8px}
.today-bar-fill{height:100%;border-radius:3px;transition:width .4s,background .4s}

/* TASK GROUPS */
.grp-hdr{font-size:10px;font-weight:800;color:#042C53;text-transform:uppercase;letter-spacing:.6px;padding:10px 0 5px;display:flex;align-items:center;justify-content:space-between}
.grp-pct{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.pg{background:#E1F5EE;color:#0F6E56}.pa{background:#FAEEDA;color:#854F0B}.pr{background:#FCEBEB;color:#A32D2D}.pn{background:#f0f0f0;color:#888}

/* TASK CARD */
.task-card{background:#fff;border-radius:11px;border:1px solid #e5ecf4;margin-bottom:6px;display:flex;align-items:center;gap:10px;padding:10px 12px;transition:border-color .15s,box-shadow .15s;cursor:pointer;user-select:none}
.task-card:hover{border-color:#B5D4F4;box-shadow:0 2px 8px rgba(12,68,124,.07)}
.task-card.done{background:#F4FBF8;border-color:#A8DBC9}
.task-card.missed{background:#FEF5F5;border-color:#F0AEAE;opacity:.75}
.chk{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;border:2px solid #ddd;background:#f8f9fa;transition:all .15s}
.task-card.done .chk{background:#1D9E75;border-color:#1D9E75;color:#fff}
.task-card.missed .chk{background:#E24B4A;border-color:#E24B4A;color:#fff}
.task-card:not(.done):not(.missed) .chk{color:#bbb}
.task-info{flex:1;min-width:0}
.task-name{font-size:13px;font-weight:600;line-height:1.35;color:#1a1a1a}
.task-card.done .task-name{color:#0F6E56}
.task-card.missed .task-name{color:#A32D2D;text-decoration:line-through}
.task-resp{margin-top:3px}
.bdg{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700}
.ra{background:#E6F1FB;color:#185FA5}.rc{background:#FAEEDA;color:#854F0B}.rp{background:#EEEDFE;color:#534AB7}.rx{background:#E1F5EE;color:#0F6E56}.rk{background:#FCEBEB;color:#A32D2D}

/* EMPTY STATE */
.empty{text-align:center;padding:2.5rem 1rem;color:#aaa}
.empty-icon{font-size:3rem;margin-bottom:.75rem}
.empty-msg{font-size:14px;font-weight:600}

/* FOOTER */
.footer{text-align:center;font-size:11px;color:#bbb;margin-top:1.5rem;font-weight:600}

/* PROGRESS RING */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-brand">📋 MEGATIENDAS — VISTA GERENTE</div>
    <div class="hdr-title">Actividades de hoy</div>

    <!-- Zona -->
    <div class="zona-row">
      <button class="zbtn on" id="zbtn-atl" onclick="setZone('Atlántico')">🌊 Atlántico</button>
      <button class="zbtn" id="zbtn-bol" onclick="setZone('Bolívar')">🏛 Bolívar</button>
      <button class="zbtn" id="zbtn-smt" onclick="setZone('Santa Marta')">⛰ Santa Marta</button>
    </div>

    <!-- Tienda -->
    <div class="store-sel-wrap">
      <div class="store-sel-lbl">Selecciona tu tienda</div>
      <select class="store-sel" id="ssel" onchange="setStore(this.value)"></select>
    </div>

    <!-- Status -->
    <div class="status-row">
      <div class="dot" id="sdot" style="background:#aaa"></div>
      <span class="status-txt" id="stxt">Conectando...</span>
      <button class="sync-btn" onclick="syncNow()">↻ Sync</button>
    </div>
  </div>

  <!-- HOY -->
  <div class="today-card" id="today-card">
    <div>
      <div class="today-date" id="today-date">—</div>
      <div class="today-day" id="today-day">—</div>
    </div>
    <div class="today-pct-wrap">
      <div class="today-pct" id="today-pct" style="color:#185FA5">—</div>
      <div class="today-pct-lbl">cumplimiento hoy</div>
    </div>
    <div style="width:100%">
      <div class="today-bar"><div class="today-bar-fill" id="today-bar-fill"></div></div>
    </div>
  </div>

  <!-- LISTA DE TAREAS -->
  <div id="task-list"></div>

  <div class="footer">Megatiendas Regional Barranquilla &mdash; Solo actividades de hoy</div>
</div>

<script>
/* ═══════════════ CONFIG ═══════════════ */
var SB_URL='https://mcomfkhvhyznbtbhwpvs.supabase.co';
var SB_KEY='sb_publishable_kh7LGnZ1CEwvybXBWP2fMg_Pf07MZZM';

var ZONES={
  'Atlántico':{key:'atl',stores:['UNICO','CALLE 30','SOLEDAD','ALKARAWI','BOSTON','SANTO TOMAS','NUESTRO ATLANTICO','VILLA CAMPESTRE']},
  'Bolívar':{key:'bol',stores:['PRADO','BAZURTO','SAN FERNANDO','OLAYA','TURBACO','SOCORRO','LA MARIA','CABRERO','AVENIDA PEDRO DE HEREDIA','TERMINAL DE TRANSPORTE','BOCAGRANDE','TURBACO 2(LA POPA)','ARJONA (LA POPA)','TORICES','CAMPESTRE','SAN JOSE DE LOS CAMPANOS','AEROPUERTO']},
  'Santa Marta':{key:'smt',stores:['MERCADO','RODADERO','TRANSPORTE','SANTA CRUZ','BAVARIA','CIENAGA']}
};

var TASKS=[
  {id:'t00',g:'Administrativo',rc:'ra',t:'Revisión de ausencias de personal',r:'Ambos',d:[0,1,2,3,4,5,6]},
  {id:'t09',g:'Administrativo',rc:'ra',t:'Revisión cierre de órdenes parciales',r:'Ambos',d:[0,1,2,3,4,5,6]},
  {id:'t01',g:'Comercial',rc:'ra',t:'Entrega plan de acción — Dinámicas comerciales',r:'Ambos',d:[0,5]},
  {id:'t02',g:'Comercial',rc:'rc',t:'Gestión agotados y excesos',r:'Comercial',d:[0,3]},
  {id:'t03',g:'Comercial',rc:'rc',t:'Gestión antigüedad por categoría',r:'Comercial',d:[1,3]},
  {id:'t04',g:'Comercial',rc:'rc',t:'Gestión de vencidos',r:'Comercial',d:[1,3]},
  {id:'t05',g:'Comercial',rc:'rc',t:'Gestión Venta Cero — bodega sin surtido',r:'Comercial',d:[0,1,2,3,4,5,6]},
  {id:'t06',g:'Comercial',rc:'rc',t:'Gestión y ajuste 1 a 5 unidades',r:'Comercial',d:[0,4]},
  {id:'t07',g:'Comercial',rc:'rc',t:'Gestión, depuración y organización bodega 03',r:'Comercial',d:[0,1]},
  {id:'t12',g:'Comercial',rc:'rc',t:'Plan de organización de bodegas',r:'Comercial',d:[0,1,2,3,4]},
  {id:'t28',g:'Comercial',rc:'ra',t:'Ingreso Facturas suministros',r:'Ambos',d:[0,2,4]},
  {id:'t29',g:'Comercial',rc:'ra',t:'Revisión de Campeones',r:'Ambos',d:[1]},
  {id:'t30',g:'Comercial',rc:'ra',t:'Bodega 02 y 04',r:'Ambos',d:[0]},
  {id:'t31',g:'Comercial',rc:'rc',t:'Revisar Rq Pendientes de Bodega',r:'Comercial',d:[0,1,2,3,4]},
  {id:'t10',g:'Principal',rc:'rp',t:'Revisión inventario transitorio (TST-TET-SDT-EDT)',r:'Principal',d:[0,1,2,3,4,5,6]},
  {id:'t11',g:'Principal',rc:'rp',t:'Revisión ítems fuera de portafolio',r:'Principal',d:[0,3]},
  {id:'t13',g:'Principal',rc:'rp',t:'Revisión cuenta exposición y negociaciones',r:'Principal',d:[3]},
  {id:'t14',g:'Principal',rc:'rp',t:'Revisión exhibiciones y lineales sin precio',r:'Principal',d:[0,1,2,3,4,5,6]},
  {id:'t15',g:'Principal',rc:'rp',t:'Revisión implementación Tipología MABCD',r:'Principal',d:[0,1,2,3,4,5,6]},
  {id:'t16',g:'Principal',rc:'rp',t:'Correo análisis de ventas (presupuesto / cómo vas)',r:'Principal',d:[0]},
  {id:'t17',g:'Principal',rc:'rp',t:'Actualización Link de Mantenimiento',r:'Principal',d:[0,5]},
  {id:'t18',g:'Principal',rc:'rp',t:'Revisión merma — reunión jueves',r:'Principal',d:[3]},
  {id:'t19',g:'Principal',rc:'rp',t:'Reunión FOCO',r:'Principal',d:[0]},
  {id:'t20',g:'Principal',rc:'rp',t:'Cumplimiento CNP',r:'Principal',d:[0,1,2,3,4,5,6]},
  {id:'t21',g:'Principal',rc:'ra',t:'Limpieza en góndolas (pegotes)',r:'Ambos',d:[0,1,2,3,4,5,6]},
  {id:'t08',g:'Caja',rc:'rx',t:'Organización y aseo puntos de pago',r:'Sup caja',d:[3,6]},
  {id:'t22',g:'Coordinadores',rc:'rk',t:'Lavado carritos y canastillas',r:'Coordinadores',d:[5,6]},
  {id:'t23',g:'Coordinadores',rc:'rk',t:'Lavado cava de lácteos',r:'Coordinadores',d:[1,3,5,6]},
  {id:'t24',g:'Coordinadores',rc:'rk',t:'Lavado cavas Fruver y Carnes',r:'Coordinadores',d:[0,3,5,6]},
  {id:'t25',g:'Coordinadores',rc:'rk',t:'Lavado canastillas Fruver',r:'Coordinadores',d:[3,5,6]},
  {id:'t26',g:'Coordinadores',rc:'rk',t:'Lavado a fondo horno de pollos',r:'Coordinadores',d:[5,6]},
  {id:'t27',g:'Coordinadores',rc:'rk',t:'Lavado a fondo recibo',r:'Coordinadores',d:[5,6]}
];
var GROUPS=['Administrativo','Comercial','Principal','Caja','Coordinadores'];
var DAYS_ES=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
var MONTHS_ES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

var curZone='Atlántico',cur='',checks={};

/* ═══════════════ HELPERS ═══════════════ */
function sbH(){return{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'resolution=merge-duplicates'};}
function getMon(){var n=new Date(),dy=n.getDay(),diff=dy===0?-6:1-dy,m=new Date(n);m.setDate(n.getDate()+diff);m.setHours(0,0,0,0);return m;}
function wkKey(){return getMon().toISOString().slice(0,10);}
function todayDi(){var mon=getMon(),now=new Date();now.setHours(0,0,0,0);var d=Math.round((now-mon)/86400000);return(d>=0&&d<7)?d:-1;}
function ck(s,w,id,di){return s+'|'+w+'|'+id+'|'+di;}
function isDone(id,di){return!!checks[ck(cur,wkKey(),id,di)];}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function pcol(p){return p>=85?'#1D9E75':p>=60?'#EF9F27':'#E24B4A';}
function pcls(p){return p>=85?'pg':p>=60?'pa':'pr';}

/* ═══════════════ SUPABASE ═══════════════ */
function setStatus(st){
  var dot=document.getElementById('sdot'),txt=document.getElementById('stxt');
  var now=new Date(),hh=now.getHours(),mm=now.getMinutes(),ts=(hh<10?'0':'')+hh+':'+(mm<10?'0':'')+mm;
  var cfg={ok:{c:'#4ADE80',m:'✅ Sincronizado '+ts},sync:{c:'#FCD34D',m:'⏳ Sincronizando...'},err:{c:'#F87171',m:'❌ Error de conexión'}};
  var v=cfg[st]||{c:'#aaa',m:'Sin conexión'};
  if(dot)dot.style.background=v.c;if(txt)txt.textContent=v.m;
}
async function sbLoad(){
  setStatus('sync');
  try{
    var r=await fetch(SB_URL+'/rest/v1/checks?select=*&done=eq.true',{headers:sbH()});
    var rows=await r.json();
    checks={};
    rows.forEach(function(row){checks[row.store+'|'+row.week+'|'+row.task_id+'|'+row.day_idx]=true;});
    setStatus('ok');
  }catch(e){setStatus('err');}
}
async function syncNow(){await sbLoad();render();}
async function sbToggle(id,di,on){
  var s=cur,w=wkKey();
  try{
    if(on){await fetch(SB_URL+'/rest/v1/checks',{method:'POST',headers:sbH(),body:JSON.stringify({store:s,week:w,task_id:id,day_idx:di,done:true})});}
    else{await fetch(SB_URL+'/rest/v1/checks?store=eq.'+encodeURIComponent(s)+'&week=eq.'+encodeURIComponent(w)+'&task_id=eq.'+encodeURIComponent(id)+'&day_idx=eq.'+di,{method:'DELETE',headers:sbH()});}
  }catch(e){}
}

/* ═══════════════ ZONA / TIENDA ═══════════════ */
function setZone(z){
  curZone=z;
  cur=ZONES[z].stores[0];
  // Botones
  Object.keys(ZONES).forEach(function(zn){
    var k=ZONES[zn].key;
    var b=document.getElementById('zbtn-'+k);
    if(b)b.classList.toggle('on',zn===z);
  });
  // Rebuild store select
  var opts=ZONES[z].stores.map(function(s){return'<option value="'+s+'">'+s+'</option>';}).join('');
  var sel=document.getElementById('ssel');if(sel)sel.innerHTML=opts;
  render();
}
function setStore(v){cur=v;render();}

/* ═══════════════ TOGGLE ═══════════════ */
function tog(id,di){
  var k=ck(cur,wkKey(),id,di),on;
  if(checks[k]){delete checks[k];on=false;}else{checks[k]=true;on=true;}
  render();sbToggle(id,di,on);
}

/* ═══════════════ RENDER ═══════════════ */
function render(){
  var tdi=todayDi(),w=wkKey();
  var now=new Date();

  // Today card
  var dayName=DAYS_ES[now.getDay()];
  var dateStr=now.getDate()+' de '+MONTHS_ES[now.getMonth()]+' '+now.getFullYear();
  var dateEl=document.getElementById('today-date');
  var dayEl=document.getElementById('today-day');
  if(dateEl)dateEl.textContent=dateStr;
  if(dayEl)dayEl.textContent=dayName;

  // Tasks for today
  if(tdi<0){
    document.getElementById('task-list').innerHTML='<div class="empty"><div class="empty-icon">📅</div><div class="empty-msg">No hay actividades para hoy.<br>La semana va de lunes a domingo.</div></div>';
    var tp=document.getElementById('today-pct');if(tp){tp.textContent='—';tp.style.color='#aaa';}
    var bf=document.getElementById('today-bar-fill');if(bf)bf.style.cssText='width:0%;background:#aaa';
    return;
  }

  var todayTasks=TASKS.filter(function(tk){return tk.d.indexOf(tdi)>=0;});
  var dn=todayTasks.filter(function(tk){return isDone(tk.id,tdi);}).length;
  var tot=todayTasks.length;
  var p=tot?Math.round(dn/tot*100):0;

  // Progress
  var tp=document.getElementById('today-pct');
  if(tp){tp.textContent=p+'%';tp.style.color=pcol(p);}
  var bf=document.getElementById('today-bar-fill');
  if(bf)bf.style.cssText='width:'+p+'%;background:'+pcol(p);

  if(!todayTasks.length){
    document.getElementById('task-list').innerHTML='<div class="empty"><div class="empty-icon">✨</div><div class="empty-msg">No hay tareas programadas para hoy.</div></div>';
    return;
  }

  var html='';
  GROUPS.forEach(function(g){
    var gt=todayTasks.filter(function(tk){return tk.g===g;});
    if(!gt.length)return;
    var gdn=gt.filter(function(tk){return isDone(tk.id,tdi);}).length;
    var gp=gt.length?Math.round(gdn/gt.length*100):null;
    html+='<div class="grp-hdr">'+g+(gp!==null?'<span class="grp-pct '+pcls(gp)+'">'+gp+'%</span>':'')+'</div>';
    gt.forEach(function(tk){
      var ok=isDone(tk.id,tdi);
      // missed = not done and today has passed (handled as tdi = today so never "missed" in this view, just pending)
      var cls=ok?' done':'';
      html+='<div class="task-card'+cls+'" onclick="tog(\''+tk.id+'\','+tdi+')">'
        +'<div class="chk">'+(ok?'✓':'')+'</div>'
        +'<div class="task-info">'
        +'<div class="task-name">'+esc(tk.t)+'</div>'
        +'<div class="task-resp"><span class="bdg '+tk.rc+'">'+tk.r+'</span></div>'
        +'</div>'
        +'</div>';
    });
  });

  document.getElementById('task-list').innerHTML=html;
}

/* ═══════════════ INICIO ═══════════════ */
async function init(){
  // Init store dropdown
  var opts=ZONES['Atlántico'].stores.map(function(s){return'<option value="'+s+'">'+s+'</option>';}).join('');
  var sel=document.getElementById('ssel');if(sel)sel.innerHTML=opts;
  cur=ZONES['Atlántico'].stores[0];
  await sbLoad();
  render();
  // Auto-sync cada 30s
  setInterval(function(){sbLoad().then(render);},30000);
}
init();
</script>
</body>
</html>
